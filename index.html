<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Insta Card News Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0b0f;--panel:#12141b;--panel2:#191c25;--brd:#242833;--txt:#e4e7ed;--dim:#7b8196;--acc:#7c5cff;--acc2:#22d3ee;--red:#ef4444;--grn:#10b981}
html,body{background:var(--bg);color:var(--txt);font-family:'Inter','Noto Sans KR',sans-serif;height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:320px 1fr 310px;grid-template-rows:56px 1fr;gap:12px;padding:12px;height:100vh}

/* Header */
.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--panel);border:1px solid var(--brd);border-radius:12px}
.topbar h1{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.topbar .logo{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 0 14px var(--acc)}
.topbar .sub{color:var(--dim);font-size:11px}

/* Panel */
.panel{background:var(--panel);border:1px solid var(--brd);border-radius:12px;padding:14px;overflow-y:auto}
.panel::-webkit-scrollbar{width:5px}
.panel::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
h3{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.field{margin-bottom:8px}
.field label{font-size:11px;color:var(--dim);display:block;margin-bottom:3px}
input[type=text],input[type=password],textarea,select{width:100%;background:var(--panel2);border:1px solid var(--brd);border-radius:6px;color:var(--txt);padding:7px 9px;font-size:12px;font-family:inherit;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
textarea{resize:vertical;min-height:50px;line-height:1.5}
button{background:linear-gradient(135deg,var(--acc),#5b3dff);color:#fff;border:none;padding:8px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
button:hover{box-shadow:0 2px 14px rgba(124,92,255,.35)}
button:active{transform:scale(.97)}
button.gh{background:var(--panel2);border:1px solid var(--brd)}
button.gh:hover{border-color:var(--acc);box-shadow:none}
button.dn{background:linear-gradient(135deg,var(--red),#b91c1c)}
button.w100{width:100%}
.row{display:flex;gap:6px}.row>*{flex:1}
.sep{height:1px;background:var(--brd);margin:10px 0}
.tip{font-size:10px;color:var(--dim);line-height:1.5;padding:6px 8px;background:var(--panel2);border-radius:5px;border-left:2px solid var(--acc)}

/* Drop zone */
.drop{border:2px dashed var(--brd);border-radius:8px;padding:10px;text-align:center;color:var(--dim);font-size:11px;cursor:pointer;transition:all .15s}
.drop:hover,.drop.drag{border-color:var(--acc);background:rgba(124,92,255,.04)}
.drop img{max-width:100%;max-height:70px;border-radius:4px;margin-top:4px}

/* ===== CAROUSEL: iPhone-style swipe ===== */
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;position:relative;overflow:hidden;user-select:none}
.track-wrap{width:432px;height:540px;overflow:hidden;border-radius:12px;position:relative}
.track{display:flex;height:100%;transition:transform .35s cubic-bezier(.25,.8,.25,1);will-change:transform;cursor:grab}
.track.dragging{transition:none;cursor:grabbing}
.track .s{flex:0 0 432px;width:432px;height:540px;position:relative;overflow:hidden;background:#1a1a1a}

/* Nav bar */
.nav-bar{display:flex;align-items:center;gap:8px}
.nav-bar .arrow{width:34px;height:34px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--panel2);border:1px solid var(--brd)}
.nav-bar .arrow:hover{border-color:var(--acc);box-shadow:none}
.pages{display:flex;gap:4px}
.pages .p{width:28px;height:28px;border-radius:6px;background:var(--panel2);border:1px solid var(--brd);color:var(--dim);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;padding:0}
.pages .p:hover{border-color:var(--acc);color:var(--txt);box-shadow:none}
.pages .p.on{background:var(--acc);border-color:var(--acc);color:#fff}
.meta{font-size:11px;color:var(--dim)}
.act-row{display:flex;gap:6px}
.act-row button{font-size:11px;padding:6px 10px}

/* Card canvas (1080x1350 scaled) */
.card{position:absolute;inset:0;width:1080px;height:1350px;transform-origin:top left;transform:scale(.4);overflow:hidden;background:#1a1a1a}
.card .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.card .gr{position:absolute;left:0;right:0;bottom:0;pointer-events:none;z-index:2}
.card .tt{position:absolute;left:60px;right:60px;word-break:keep-all;line-height:1.2;font-weight:900;color:#fff;font-family:'Noto Sans KR',sans-serif;z-index:3}
.card .grid-ov{position:absolute;inset:0;z-index:10;pointer-events:none;display:none}
.card .grid-ov.on{display:block}
.card .grid-ov .gl{position:absolute;background:rgba(255,255,255,.18)}
.card .grid-ov .glh{left:0;right:0;height:1px}
.card .grid-ov .glv{top:0;bottom:0;width:1px}

/* Sliders */
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--brd);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--acc);cursor:pointer}
.sr{display:flex;align-items:center;gap:6px}
.sr .v{font-size:10px;color:var(--dim);width:36px;text-align:right;font-variant-numeric:tabular-nums}
input[type=color]{width:32px;height:26px;background:transparent;border:1px solid var(--brd);border-radius:5px;cursor:pointer;padding:1px}
.sh-row{display:flex;gap:10px;align-items:center}
.sh-wheel{width:72px;height:72px;border-radius:50%;border:2px solid var(--brd);background:var(--panel2);position:relative;cursor:grab;flex-shrink:0;user-select:none;touch-action:none}
.sh-wheel:active{cursor:grabbing;border-color:var(--acc)}
.sh-wheel .sh-center{position:absolute;top:50%;left:50%;width:4px;height:4px;background:var(--dim);border-radius:50%;transform:translate(-50%,-50%)}
.sh-wheel .sh-ind{position:absolute;width:12px;height:12px;background:var(--acc);border-radius:50%;box-shadow:0 0 8px var(--acc);pointer-events:none;margin:-6px 0 0 -6px}
.sh-sliders{flex:1;display:flex;flex-direction:column;gap:6px}

/* Tabs */
.tabs{display:flex;background:var(--panel2);border-radius:7px;padding:2px;margin-bottom:8px}
.tabs button{flex:1;background:transparent;color:var(--dim);padding:5px 2px;font-size:10px;border-radius:5px;white-space:nowrap}
.tabs button.on{background:var(--panel);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tabs button:hover{box-shadow:none}
.tp{display:none}.tp.show{display:block}

/* Loading */
.ov{position:fixed;inset:0;background:rgba(10,11,15,.9);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:100}
.ov.on{display:flex}
.lc{background:var(--panel);border:1px solid var(--brd);border-radius:14px;padding:30px 44px;text-align:center;min-width:300px}
.sp{width:40px;height:40px;margin:0 auto 14px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lc .st{font-size:14px;font-weight:700;margin-bottom:6px}
.lc .su{color:var(--dim);font-size:11px}
.ls{text-align:left;margin-top:14px}
.ls .si{display:flex;align-items:center;gap:7px;font-size:12px;padding:4px 0;color:var(--dim)}
.ls .si.ac{color:var(--txt);font-weight:600}
.ls .si.dn{color:var(--grn)}
.ls .si i{width:16px;text-align:center;font-style:normal}

/* Toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--brd);color:var(--txt);padding:8px 16px;border-radius:7px;font-size:12px;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.4);opacity:0;transition:all .2s;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(-4px)}

.img-up{border:2px dashed var(--brd);border-radius:6px;padding:7px;text-align:center;font-size:10px;color:var(--dim);cursor:pointer}
.img-up:hover{border-color:var(--acc)}

/* ===== License Gate ===== */
.lic-gate{position:fixed;inset:0;background:radial-gradient(1200px 600px at 10% -10%,#1a1a3a 0%,transparent 60%),radial-gradient(800px 500px at 110% 10%,#0e3a44 0%,transparent 60%),rgba(10,11,15,.98);backdrop-filter:blur(20px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.lic-card{background:var(--panel);border:1px solid var(--brd);border-radius:18px;padding:40px 36px;width:100%;max-width:420px;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.5)}
.lic-logo{width:56px;height:56px;margin:0 auto 18px;border-radius:16px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 40px rgba(124,92,255,.4)}
.lic-title{font-size:20px;font-weight:800;margin-bottom:6px}
.lic-sub{font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.5}
.lic-input{width:100%;background:var(--panel2);border:1px solid var(--brd);border-radius:10px;color:var(--txt);padding:14px 16px;font-size:15px;font-family:'Menlo','Monaco',monospace;letter-spacing:.05em;outline:none;text-align:center;transition:all .15s}
.lic-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,92,255,.15)}
.lic-input::placeholder{color:var(--dim);opacity:.5}
.lic-err{font-size:12px;color:var(--red);margin-top:10px;min-height:16px}
.lic-btn{width:100%;background:linear-gradient(135deg,var(--acc),#5b3dff);color:#fff;border:none;padding:13px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;transition:all .15s}
.lic-btn:hover{box-shadow:0 4px 20px rgba(124,92,255,.45);transform:translateY(-1px)}
.lic-btn:active{transform:translateY(0)}
.lic-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.lic-info{font-size:11px;color:var(--dim);margin-top:18px;line-height:1.6}
.lic-info a{color:var(--acc);text-decoration:none}
.lic-logout{position:fixed;bottom:14px;right:14px;z-index:500;font-size:10px;color:var(--dim);background:var(--panel);border:1px solid var(--brd);padding:5px 10px;border-radius:5px;cursor:pointer;opacity:.4;transition:opacity .2s}
.lic-logout:hover{opacity:1}
</style>
</head>
<body>

<!-- License Gate -->
<div class="lic-gate" id="licGate">
  <div class="lic-card">
    <div class="lic-logo">🔐</div>
    <div class="lic-title">Insta Card News Maker</div>
    <div class="lic-sub">수강생 접근 코드를 입력하세요</div>
    <input type="text" class="lic-input" id="licInput" placeholder="ICNM-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false"/>
    <div class="lic-err" id="licErr"></div>
    <button class="lic-btn" id="licBtn">입장</button>
    <div class="lic-info">접근 코드가 없으신가요?<br/>강의를 결제하신 후 발급받을 수 있습니다.</div>
  </div>
</div>
<button class="lic-logout" id="licLogout" style="display:none">로그아웃</button>

<div class="app">
  <header class="topbar">
    <h1><span class="logo"></span>Insta Card News Maker</h1>
    <span class="sub">Anthropic API · 1080x1350 · 다국어</span>
  </header>

  <!-- LEFT -->
  <aside class="panel">
    <h3>API</h3>
    <div class="field"><label>Key <label id="lockLabel" style="display:inline;cursor:pointer;margin-left:6px;color:var(--acc)"><input type="checkbox" id="lockApi" style="display:none"/><span id="lockIcon">🔓 잠금</span></label></label><input type="password" id="apiKey" placeholder="sk-ant-..."/></div>
    <div class="field"><label>모델</label><select id="model"><option value="claude-opus-4-6">Opus 4.6</option><option value="claude-sonnet-4-6" selected>Sonnet 4.6</option><option value="claude-haiku-4-5-20251001">Haiku 4.5</option></select></div>
    <div class="sep"></div>

    <h3>인스타그램 원본</h3>
    <div class="field"><label>게시물 이미지</label><div class="drop" id="d1"><span id="d1t">이미지 업로드</span><img id="d1p" style="display:none"/></div><input type="file" id="f1" accept="image/*" style="display:none"/></div>
    <div class="field"><label>본문 캡쳐</label><div class="drop" id="d2"><span id="d2t">본문 스크린샷 업로드</span><img id="d2p" style="display:none"/></div><input type="file" id="f2" accept="image/*" style="display:none"/></div>
    <button class="w100" id="goBtn">분석하고 카드 생성</button>
    <div class="sep"></div>

    <h3>번역 & 다운로드</h3>
    <div class="field"><label>언어</label><select id="lang"><option value="ko">한국어</option><option value="en">English</option><option value="ja">日本語</option><option value="zh">简体中文</option><option value="es">Espanol</option><option value="vi">Tieng Viet</option><option value="id">Indonesia</option><option value="th">ไทย</option><option value="fr">Francais</option><option value="de">Deutsch</option></select></div>
    <div class="row"><button class="gh" id="trBtn">번역</button><button id="dlBtn">다운로드</button></div>
  </aside>

  <!-- CENTER -->
  <main class="center">
    <div class="track-wrap"><div class="track" id="track"></div></div>
    <div class="nav-bar">
      <button class="arrow" id="pv">&larr;</button>
      <div class="pages" id="pgs"></div>
      <button class="arrow" id="nx">&rarr;</button>
    </div>
    <div class="meta" id="meta"></div>
    <div class="act-row">
      <button class="gh" id="addBtn">+ 장면 추가</button>
      <button class="dn" id="rmBtn" style="display:none">삭제</button>
    </div>
  </main>

  <!-- RIGHT: Editor -->
  <aside class="panel" id="rp">
    <h3 id="rTitle">편집</h3>
    <div id="noSel" class="tip">분석하면 카드가 생성됩니다.</div>
    <div id="ed" style="display:none">
      <div class="tabs">
        <button class="on" data-t="logo">로고</button>
        <button data-t="tstyle">제목 스타일</button>
        <button data-t="grad">그라데이션</button>
      </div>

      <!-- Logo -->
      <div class="tp show" data-p="logo">
        <div class="field"><label>로고 이미지</label><div class="img-up" id="logoUp">로고 업로드</div><input type="file" id="logoF" accept="image/*" style="display:none"/></div>
        <div class="field" id="logoControls" style="display:none">
          <label>크기 (px)</label>
          <div class="sr"><input type="range" id="logoSize" min="40" max="300" value="120"/><span class="v" id="logoSizeV">120</span></div>
          <label style="margin-top:8px">여백 (px)</label>
          <div class="sr"><input type="range" id="logoPad" min="20" max="120" value="40"/><span class="v" id="logoPadV">40</span></div>
          <label style="margin-top:8px">위치</label>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:4px">
            <button class="gh" data-lp="tl" style="font-size:10px;padding:8px">&#8598; 좌상</button>
            <button class="gh" data-lp="tc" style="font-size:10px;padding:8px">&#8593; 중상</button>
            <button class="gh" data-lp="tr" style="font-size:10px;padding:8px">&#8599; 우상</button>
            <button class="gh" data-lp="bl" style="font-size:10px;padding:8px">&#8601; 좌하</button>
            <button class="gh" data-lp="bc" style="font-size:10px;padding:8px">&#8595; 중하</button>
            <button class="gh" data-lp="br" style="font-size:10px;padding:8px">&#8600; 우하</button>
          </div>
          <label style="margin-top:8px">X 미세조정 (px)</label>
          <div class="sr"><input type="range" id="logoX" min="0" max="1080" value="0"/><span class="v" id="logoXV">0</span></div>
          <label style="margin-top:4px">Y 미세조정 (px)</label>
          <div class="sr"><input type="range" id="logoY" min="0" max="1350" value="0"/><span class="v" id="logoYV">0</span></div>
          <button class="dn" id="logoRm" style="width:100%;margin-top:8px;font-size:10px;padding:6px">로고 제거</button>
        </div>
      </div>

      <!-- Gradient -->
      <div class="tp" data-p="grad">
        <div class="field"><label>색상</label><div class="row" style="align-items:center"><input type="color" id="gc" value="#000000"/><input type="text" id="gx" value="#000000" style="flex:2"/></div></div>
        <div class="field"><label>높이 %</label><div class="sr"><input type="range" id="gh" min="10" max="100" value="60"/><span class="v" id="ghv">60%</span></div></div>
        <div class="field"><label>강도</label><div class="sr"><input type="range" id="go" min="0" max="100" value="95"/><span class="v" id="gov">95%</span></div></div>
        <div class="field"><label>부드러움</label><div class="sr"><input type="range" id="gs" min="0" max="100" value="50"/><span class="v" id="gsv">50%</span></div></div>
      </div>

      <!-- Title Style -->
      <div class="tp" data-p="tstyle">
        <div class="field"><label>제목</label><textarea id="eT" rows="2"></textarea></div>
        <div class="field"><label>본문 (참고용)</label><textarea id="eB" rows="3"></textarea></div>
        <div class="sep"></div>
        <div class="field"><label>크기 px</label><div class="sr"><input type="range" id="tz" min="40" max="140" value="80"/><span class="v" id="tzv">80</span></div></div>
        <div class="field"><label>색상</label><div class="row" style="align-items:center"><input type="color" id="tc" value="#ffffff"/><input type="text" id="tx" value="#ffffff" style="flex:2"/></div></div>
        <div class="field"><label>강조 색상 <span style="color:var(--dim);font-size:9px">제목에서 {중괄호}로 감싼 부분</span></label><div class="row" style="align-items:center"><input type="color" id="thc" value="#ffcc00"/><input type="text" id="thx" value="#ffcc00" style="flex:2"/></div></div>
        <div class="field"><label>위치 (하단 px)</label><div class="sr"><input type="range" id="tb" min="40" max="700" value="200"/><span class="v" id="tbv">200</span></div></div>
        <div class="field"><label>정렬</label><select id="ta"><option value="left">왼쪽</option><option value="center">가운데</option><option value="right">오른쪽</option></select></div>
        <div class="field"><label>두께</label><select id="tw"><option value="900" selected>Black</option><option value="700">Bold</option><option value="500">Medium</option></select></div>
        <div class="field"><label>행간 (line-height)</label><div class="sr"><input type="range" id="tlh" min="80" max="200" value="120"/><span class="v" id="tlhv">120%</span></div></div>
        <div class="field"><label>자간 (letter-spacing)</label><div class="sr"><input type="range" id="tls" min="-10" max="30" value="0"/><span class="v" id="tlsv">0px</span></div></div>
        <div class="sep"></div>
        <div class="field"><label>테두리 두께 px</label><div class="sr"><input type="range" id="tsk" min="0" max="10" value="0"/><span class="v" id="tskv">0</span></div></div>
        <div class="field"><label>테두리 색상</label><div class="row" style="align-items:center"><input type="color" id="tskc" value="#000000"/><input type="text" id="tskx" value="#000000" style="flex:2"/></div></div>
        <div class="sep"></div>
        <div class="field"><label>그림자 흐림 px</label><div class="sr"><input type="range" id="tshb" min="0" max="60" value="30"/><span class="v" id="tshbv">30</span></div></div>
        <div class="field"><label>그림자 방향 & 거리</label>
          <div class="sh-row">
            <div class="sh-wheel" id="shWheel"><div class="sh-center"></div><div class="sh-ind" id="shInd"></div></div>
            <div class="sh-sliders">
              <div class="sr"><input type="range" id="shang" min="0" max="360" value="180"/><span class="v" id="shangV">180°</span></div>
              <div class="sr"><input type="range" id="shdist" min="0" max="30" value="4"/><span class="v" id="shdistV">4px</span></div>
            </div>
          </div>
        </div>
        <div class="field"><label>그림자 색상</label><div class="row" style="align-items:center"><input type="color" id="tshc" value="#000000"/><input type="text" id="tshx" value="#000000" style="flex:2"/></div></div>

/* ===== Build card DOM ===== */
function bCard(c){
  const el=document.createElement('div');el.className='card';
  if(c.media){
    if(c.mediaType==='video'){const v=document.createElement('video');v.className='bg';v.src=c.media;v.autoplay=true;v.loop=true;v.muted=true;v.playsInline=true;v.style.objectFit='cover';el.appendChild(v)}
    else{const i=document.createElement('img');i.className='bg';i.src=c.media;i.crossOrigin='anonymous';el.appendChild(i)}
  } else if(c.img){const i=document.createElement('img');i.className='bg';i.src=c.img;i.crossOrigin='anonymous';el.appendChild(i)}
  else el.style.background='linear-gradient(135deg,#2a2a4a,#1a1a2a)'
  const gr=document.createElement('div');gr.className='gr';gr.style.height=c.g.h+'%';
  const t0=0,t1=c.g.o*(c.g.s/100)/100,t2=c.g.o/100;
  gr.style.background=`linear-gradient(to bottom,${rgba(c.g.c,t0)} 0%,${rgba(c.g.c,t1)} 50%,${rgba(c.g.c,t2)} 100%)`;
  el.appendChild(gr);
  const tt=document.createElement('div');tt.className='tt';
  const shA=(c.t.sha||0)/100;
  const shCol=rgba(c.t.shc||'#000000',shA);
  const shX=c.t.shx||0, shY=c.t.shy||0, shB=c.t.shb||0;
  const sk=c.t.sk||0, skC=c.t.skc||'#000000';
  tt.style.fontSize=(c.t.z)+'px';
  tt.style.color=c.t.c;
  tt.style.bottom=(c.t.b)+'px';
  tt.style.textAlign=c.t.a;
  tt.style.fontWeight=c.t.w;
  tt.style.lineHeight=(c.t.lh||120)+'%';
  tt.style.letterSpacing=(c.t.ls||0)+'px';
  tt.style.textShadow=shX+'px '+shY+'px '+shB+'px '+shCol;
  if(sk>0){
    tt.style.webkitTextStroke=sk+'px '+skC;
    tt.style.paintOrder='stroke fill';
  }
  // {중괄호} 강조 처리
  let html=c.title.replace(/\n/g,'<br>');
  html=html.replace(/\{([^}]+)\}/g,'<span style="color:'+c.t.hc+';-webkit-text-stroke:inherit">$1</span>');
  tt.innerHTML=html;el.appendChild(tt);
  // Grid overlay (3x3)
  const gOv=document.createElement('div');gOv.className='grid-ov'+(S.grid?' on':'');
  [1,2].forEach(n=>{const h=document.createElement('div');h.className='gl glh';h.style.top=(1350/3*n)+'px';gOv.appendChild(h);const v=document.createElement('div');v.className='gl glv';v.style.left=(1080/3*n)+'px';gOv.appendChild(v)});
  // center cross
  const ch=document.createElement('div');ch.className='gl glh';ch.style.top='675px';ch.style.left='490px';ch.style.right='490px';ch.style.background='rgba(255,255,255,.3)';gOv.appendChild(ch);
  const cv=document.createElement('div');cv.className='gl glv';cv.style.left='540px';cv.style.top='625px';cv.style.bottom='625px';cv.style.background='rgba(255,255,255,.3)';gOv.appendChild(cv);
  el.appendChild(gOv);
  // Logo
  if(c.logo&&c.logo.src){
    const lg=document.createElement('img');lg.src=c.logo.src;lg.crossOrigin='anonymous';
    const sz=c.logo.size,pd=c.logo.pad,p=c.logo.pos,L=c.logo;
    let css=`position:absolute;width:${sz}px;height:${sz}px;object-fit:contain;z-index:3;`;
    if(L.useXY){css+=`left:${L.x}px;top:${L.y}px;`}
    else if(p==='tl')css+=`top:${pd}px;left:${pd}px;`;
    else if(p==='tc')css+=`top:${pd}px;left:50%;transform:translateX(-50%);`;
    else if(p==='tr')css+=`top:${pd}px;right:${pd}px;`;
    else if(p==='bl')css+=`bottom:${pd}px;left:${pd}px;`;
    else if(p==='bc')css+=`bottom:${pd}px;left:50%;transform:translateX(-50%);`;
    else css+=`bottom:${pd}px;right:${pd}px;`;
    lg.style.cssText=css;el.appendChild(lg);
  }
  return el;
}

/* Keyboard */
document.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;if(e.key==='ArrowLeft')go(S.idx-1);if(e.key==='ArrowRight')go(S.idx+1)});

/* Mouse drag swipe */
let dragging=false,startX=0,curX=0;
$track.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;curX=0;$track.classList.add('dragging');e.preventDefault()});

  slideTO();updateUI();rEd();curX=0});

/* Touch swipe */
let tStartX=0,tCurX=0;
$track.addEventListener('touchstart',e=>{tStartX=e.touches[0].clientX;tCurX=0;$track.classList.add('dragging')},{passive:true});

function rEd(){
  const c=S.cards[S.idx],ns=document.getElementById('noSel'),ed=document.getElementById('ed');
  if(!c){ns.style.display='block';ed.style.display='none';document.getElementById('rTitle').textContent='편집';return}

  sv('eT',c.title);sv('eB',c.body);
  sv('gc',c.g.c);sv('gx',c.g.c);sr('gh','ghv',c.g.h,'%');sr('go','gov',c.g.o,'%');sr('gs','gsv',c.g.s,'%');
  sr('tz','tzv',c.t.z);sv('tc',c.t.c);sv('tx',c.t.c);sv('thc',c.t.hc);sv('thx',c.t.hc);sr('tb','tbv',c.t.b);sv('ta',c.t.a);sv('tw',c.t.w);

/* Shadow angle wheel */
function applyShadowFromAng(c){
  const d=c.t.shdist||0, a=c.t.shang||0;
  const rad=a*Math.PI/180;
  c.t.shx=Math.round(Math.sin(rad)*d);
  c.t.shy=Math.round(-Math.cos(rad)*d);
}
function updateWheel(){
  const c=cur();if(!c)return;
  const ind=document.getElementById('shInd');if(!ind)return;
  const wheel=document.getElementById('shWheel');
  const r=wheel.offsetWidth/2-8; // indicator radius within wheel
  const ang=c.t.shang||0;
  // 0° = top, clockwise
  const rad=(ang-90)*Math.PI/180;
  const cx=wheel.offsetWidth/2;
  const cy=wheel.offsetHeight/2;
  ind.style.left=(cx+Math.cos(rad)*r)+'px';
  ind.style.top=(cy+Math.sin(rad)*r)+'px';
}
document.getElementById('shang').oninput=e=>{const v=+e.target.value;document.getElementById('shangV').textContent=v+'°';up(c=>{c.t.shang=v;applyShadowFromAng(c)});updateWheel()};
document.getElementById('shdist').oninput=e=>{const v=+e.target.value;document.getElementById('shdistV').textContent=v+'px';up(c=>{c.t.shdist=v;applyShadowFromAng(c)})};

(function(){
  const wheel=document.getElementById('shWheel');
  let dragging=false;
  function getAng(e){
    const rect=wheel.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const px=e.touches?e.touches[0].clientX:e.clientX;
    const py=e.touches?e.touches[0].clientY:e.clientY;
    let a=Math.atan2(py-cy,px-cx)*180/Math.PI;
    a=(a+90+360)%360;
    return Math.round(a);
  }
  function setA(a){
    document.getElementById('shang').value=a;
    document.getElementById('shangV').textContent=a+'°';
    up(c=>{c.t.shang=a;applyShadowFromAng(c)});
    updateWheel();
  }
  wheel.addEventListener('mousedown',e=>{dragging=true;setA(getAng(e));e.preventDefault()});
  document.addEventListener('mousemove',e=>{if(dragging)setA(getAng(e))});
  document.addEventListener('mouseup',()=>dragging=false);
  wheel.addEventListener('touchstart',e=>{dragging=true;setA(getAng(e));e.preventDefault()},{passive:false});
  wheel.addEventListener('touchmove',e=>{if(dragging){setA(getAng(e));e.preventDefault()}},{passive:false});
  wheel.addEventListener('touchend',()=>dragging=false);
})();

/* Render video card to MP4 blob */
/* Shared overlay drawing (gradient + title + logo) */
function drawOverlay(ctx,c,logoImg){
  // Gradient
  const gh=1350*c.g.h/100;
  const grd=ctx.createLinearGradient(0,1350-gh,0,1350);
  grd.addColorStop(0,rgba(c.g.c,0));
  grd.addColorStop(0.5,rgba(c.g.c,c.g.o*(c.g.s/100)/100));
  grd.addColorStop(1,rgba(c.g.c,c.g.o/100));
  ctx.fillStyle=grd;ctx.fillRect(0,1350-gh,1080,gh);
  // Title
  const _font=`${c.t.w} ${c.t.z}px 'Noto Sans KR',sans-serif`;
  ctx.font=_font;
  const shA2=(c.t.sha||0)/100;
  ctx.shadowColor=rgba(c.t.shc||'#000',shA2);ctx.shadowBlur=c.t.shb||0;
  ctx.shadowOffsetX=c.t.shx||0;ctx.shadowOffsetY=c.t.shy||0;
  if((c.t.sk||0)>0){ctx.strokeStyle=c.t.skc;ctx.lineWidth=c.t.sk*2;ctx.lineJoin='round'}
  const lines=c.title.split('\n');
  const lh=c.t.z*((c.t.lh||120)/100);
  const xBase=c.t.a==='center'?540:c.t.a==='right'?1020:60;
  ctx.textAlign=c.t.a;
  lines.forEach((line,li)=>{
    const yy=1350-c.t.b+(li-(lines.length-1))*lh;
    const parts=[];const re=/\{([^}]+)\}/g;let last=0,m;
    while((m=re.exec(line))!==null){
      if(m.index>last)parts.push({t:line.slice(last,m.index),h:false});
      parts.push({t:m[1],h:true});last=re.lastIndex;
    }
    if(last<line.length)parts.push({t:line.slice(last),h:false});
    if(!parts.length)parts.push({t:line,h:false});
    if(c.t.a==='center'||c.t.a==='right'){
      ctx.textAlign='left';
      let tw=0;parts.forEach(p=>{tw+=ctx.measureText(p.t).width});
      let sx=c.t.a==='center'?(1080-tw)/2:1080-tw-60;
      parts.forEach(p=>{
        ctx.fillStyle=p.h?c.t.hc:c.t.c;
        if((c.t.sk||0)>0)ctx.strokeText(p.t,sx,yy);
        ctx.fillText(p.t,sx,yy);
        sx+=ctx.measureText(p.t).width;
      });
      ctx.textAlign=c.t.a;
    }else{
      let sx=xBase;ctx.textAlign='left';
      parts.forEach(p=>{
        ctx.fillStyle=p.h?c.t.hc:c.t.c;
        if((c.t.sk||0)>0)ctx.strokeText(p.t,sx,yy);
        ctx.fillText(p.t,sx,yy);
        sx+=ctx.measureText(p.t).width;
      });
    }
  });
  ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;ctx.lineWidth=1;
  // Logo
  if(logoImg&&c.logo){
    const sz=c.logo.size,pd=c.logo.pad,p=c.logo.pos,L=c.logo;
    let lx,ly;
    if(L.useXY){lx=L.x;ly=L.y}
    else{
      if(p==='tl'){lx=pd;ly=pd}else if(p==='tc'){lx=(1080-sz)/2;ly=pd}else if(p==='tr'){lx=1080-sz-pd;ly=pd}
      else if(p==='bl'){lx=pd;ly=1350-sz-pd}else if(p==='bc'){lx=(1080-sz)/2;ly=1350-sz-pd}else{lx=1080-sz-pd;ly=1350-sz-pd}
    }
    // object-fit:contain
    const iw=logoImg.naturalWidth||sz, ih=logoImg.naturalHeight||sz;
    const s=Math.min(sz/iw,sz/ih);const dw=iw*s,dh=ih*s;
    ctx.drawImage(logoImg,lx+(sz-dw)/2,ly+(sz-dh)/2,dw,dh);
  }
}

/* Render image card to PNG blob */
async function renderImageCard(c){
  const canvas=document.createElement('canvas');canvas.width=1080;canvas.height=1350;
  const ctx=canvas.getContext('2d');
  // Background: image, or fallback gradient
  const src=(c.media&&c.mediaType!=='video')?c.media:c.img;
  if(src){
    const img=new Image();img.crossOrigin='anonymous';img.src=src;
    await new Promise((res,rej)=>{img.onload=res;img.onerror=rej});
    const iw=img.naturalWidth,ih=img.naturalHeight;
    const scale=Math.max(1080/iw,1350/ih);
    const dw=iw*scale,dh=ih*scale;
    ctx.drawImage(img,(1080-dw)/2,(1350-dh)/2,dw,dh);
  }else{
    const g=ctx.createLinearGradient(0,0,1080,1350);
    g.addColorStop(0,'#2a2a4a');g.addColorStop(1,'#1a1a2a');
    ctx.fillStyle=g;ctx.fillRect(0,0,1080,1350);
  }
  // Load logo if any
  let logoImg=null;
  if(c.logo&&c.logo.src){
    logoImg=new Image();logoImg.crossOrigin='anonymous';logoImg.src=c.logo.src;
    await new Promise(r=>{logoImg.onload=r;logoImg.onerror=r});
  }
  drawOverlay(ctx,c,logoImg);
  return new Promise(res=>canvas.toBlob(b=>res(b),'image/png'));
}

function renderVideoCard(c){
  return new Promise((resolve,reject)=>{
    const canvas=document.createElement('canvas');canvas.width=1080;canvas.height=1350;
    const ctx=canvas.getContext('2d');
    const vid=document.createElement('video');vid.src=c.media;vid.muted=true;vid.playsInline=true;
    vid.onloadeddata=()=>{
      const duration=Math.min(vid.duration,30)*1000; // max 30s
      const mimeType=MediaRecorder.isTypeSupported('video/mp4;codecs=avc1')?'video/mp4;codecs=avc1':
                      MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
      const ext=mimeType.startsWith('video/mp4')?'mp4':'webm';
      const stream=canvas.captureStream(30);
      const rec=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:8000000});
      const chunks=[];
      rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
      rec.onstop=()=>{const blob=new Blob(chunks,{type:mimeType});resolve(blob)};
      rec.onerror=e=>reject(e.error);
      vid.play();rec.start();
      function draw(){
        if(vid.ended||vid.currentTime*1000>=duration){rec.stop();return}
        // Draw video frame
        const vw=vid.videoWidth,vh=vid.videoHeight;
        const scale=Math.max(1080/vw,1350/vh);
        const dw=vw*scale,dh=vh*scale;
        ctx.drawImage(vid,(1080-dw)/2,(1350-dh)/2,dw,dh);
        // Draw gradient
        const gh=1350*c.g.h/100;
        const grd=ctx.createLinearGradient(0,1350-gh,0,1350);
        grd.addColorStop(0,rgba(c.g.c,0));
        grd.addColorStop(0.5,rgba(c.g.c,c.g.o*(c.g.s/100)/100));
        grd.addColorStop(1,rgba(c.g.c,c.g.o/100));
        ctx.fillStyle=grd;ctx.fillRect(0,1350-gh,1080,gh);
        // Draw title with {highlight} support
        const _font=`${c.t.w} ${c.t.z}px 'Noto Sans KR',sans-serif`;
        ctx.font=_font;
        const shA2=c.t.sha/100;ctx.shadowColor=rgba(c.t.shc,shA2);ctx.shadowBlur=c.t.shb;ctx.shadowOffsetX=c.t.shx||0;ctx.shadowOffsetY=c.t.shy||0;
        if(c.t.sk>0){ctx.strokeStyle=c.t.skc;ctx.lineWidth=c.t.sk*2;ctx.lineJoin='round'}
        const lines=c.title.split('\n');
        const lh=c.t.z*(c.t.lh/100);
        const xBase=c.t.a==='center'?540:c.t.a==='right'?1020:60;
        ctx.textAlign=c.t.a;
        lines.forEach((line,li)=>{
          const yy=1350-c.t.b+(li-(lines.length-1))*lh;
          // Parse {highlighted} parts
          const parts=[];let rem=line,m;
          const re=/\{([^}]+)\}/g;let last=0;
          while((m=re.exec(line))!==null){
            if(m.index>last)parts.push({t:line.slice(last,m.index),h:false});
            parts.push({t:m[1],h:true});last=re.lastIndex;
          }
          if(last<line.length)parts.push({t:line.slice(last),h:false});
          if(!parts.length)parts.push({t:line,h:false});
          // If aligned center/right, draw whole line per part with offset
          if(c.t.a==='center'||c.t.a==='right'){
            // Measure total width to manually position
            ctx.textAlign='left';
            let tw=0;parts.forEach(p=>{tw+=ctx.measureText(p.t).width});
            let sx=c.t.a==='center'?(1080-tw)/2:1080-tw-60;
            parts.forEach(p=>{
              ctx.fillStyle=p.h?c.t.hc:c.t.c;
              if(c.t.sk>0)ctx.strokeText(p.t,sx,yy);
              ctx.fillText(p.t,sx,yy);
              sx+=ctx.measureText(p.t).width;
            });
            ctx.textAlign=c.t.a;
          }else{
            let sx=xBase;ctx.textAlign='left';
            parts.forEach(p=>{
              ctx.fillStyle=p.h?c.t.hc:c.t.c;
              if(c.t.sk>0)ctx.strokeText(p.t,sx,yy);
              ctx.fillText(p.t,sx,yy);
              sx+=ctx.measureText(p.t).width;
            });
          }
        });
        ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;ctx.lineWidth=1;
        // Draw logo
        if(logoImg){
          const sz=c.logo.size,pd=c.logo.pad,p=c.logo.pos,L=c.logo;
          let lx,ly;
          if(L.useXY){lx=L.x;ly=L.y}
          else{
            if(p==='tl'){lx=pd;ly=pd}else if(p==='tc'){lx=(1080-sz)/2;ly=pd}else if(p==='tr'){lx=1080-sz-pd;ly=pd}
            else if(p==='bl'){lx=pd;ly=1350-sz-pd}else if(p==='bc'){lx=(1080-sz)/2;ly=1350-sz-pd}else{lx=1080-sz-pd;ly=1350-sz-pd}
          }
          ctx.drawImage(logoImg,lx,ly,sz,sz);
        }
        requestAnimationFrame(draw);
      }
      // Preload logo
      let logoImg=null;
      if(c.logo&&c.logo.src){
        logoImg=new Image();logoImg.src=c.logo.src;
        logoImg.onload=()=>draw();logoImg.onerror=()=>draw();
      }else{draw()}
      setTimeout(()=>{if(rec.state==='recording')rec.stop()},duration+500);
    };
    vid.onerror=()=>reject(Error('동영상 로드 실패'));
  });
}
